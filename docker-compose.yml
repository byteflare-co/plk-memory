services:
  postgres:
    image: postgres:17-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: plk
      POSTGRES_USER: plk
      POSTGRES_PASSWORD: plk
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plk -d plk"]
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:latest
    environment:
      # RDB スナップショット（既定 save 3600 1 / 300 100 / 60 10000）に加えて AOF を
      # 有効化し、非正常終了時のデータ損失窓を最大1時間→約1秒に縮める。
      # appendonlydir は redis の --dir (= /var/lib/falkordb/data) 配下に作られ、
      # 下の named volume に永続化される（run.sh が ${REDIS_ARGS} を展開する）。
      REDIS_ARGS: "--appendonly yes"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      # /var/lib/falkordb/data はイメージの FALKORDB_DATA_PATH（redis --dir）と一致
      - falkordb-data:/var/lib/falkordb/data
    restart: unless-stopped

volumes:
  postgres-data:
  falkordb-data:
