<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>plk-memory</title>
<style>
  :root {
    --bg: #020617;
    --surface: #0e1223;
    --surface-hover: #141a2e;
    --surface-2: #131829;
    --border: #232b3d;
    --border-strong: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-faint: #5b6b84;
    --accent: #3b82f6;
    --accent-fg: #ffffff;
    --success: #22c55e;
    --success-bg: rgba(34, 197, 94, .13);
    --danger: #f87171;
    --danger-bg: rgba(248, 113, 113, .13);
    --warning: #fbbf24;
    --warning-bg: rgba(251, 191, 36, .12);
    --focus-ring: #60a5fa;
    --scrim: rgba(2, 6, 23, .64);
    --radius: 8px;
    --radius-sm: 5px;
    --ns-tax: #f59e0b; --ns-legal: #8b5cf6; --ns-shaho: #06b6d4;
    --ns-dev: #fb923c; --ns-backoffice: #84cc16; --ns-biz: #ec4899; --ns-agent: #3b82f6; --ns-shared: #22c55e;
    --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Segoe UI", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9; --surface-2: #f1f5f9;
      --border: #e2e8f0; --border-strong: #cbd5e1;
      --text: #0f172a; --text-muted: #64748b; --text-faint: #94a3b8;
      --accent: #2563eb; --accent-fg: #ffffff;
      --success: #16a34a; --success-bg: rgba(22, 163, 74, .10);
      --danger: #dc2626; --danger-bg: rgba(220, 38, 38, .10);
      --warning: #d97706; --warning-bg: rgba(217, 119, 6, .10);
      --focus-ring: #2563eb; --scrim: rgba(15, 23, 42, .38);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: var(--accent-fg); }
  :focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; border-radius: var(--radius-sm); }
  button, input { font-family: inherit; color: inherit; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 30;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 7px; background: var(--accent); color: var(--accent-fg);
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex: none;
  }
  .brand { display: flex; flex-direction: column; }
  .brand .name { font-weight: 600; font-size: 14.5px; letter-spacing: -.01em; }
  .brand .kicker { font-size: 11px; color: var(--text-faint); }
  .ro-badge {
    margin-left: auto; font-size: 10.5px; color: var(--text-muted); border: 1px solid var(--border-strong);
    border-radius: 999px; padding: 3px 10px; display: flex; align-items: center; gap: 5px;
  }
  .ro-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

  #login {
    max-width: 340px; margin: 14vh auto 0; padding: 28px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 12px 32px -16px rgba(0,0,0,.5);
  }
  #login h2 { font-size: 17px; font-weight: 600; margin: 0 0 4px; }
  #login p.hint { color: var(--text-muted); font-size: 12.5px; margin: 0 0 18px; }
  .field-label {
    display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px;
  }
  #pw {
    width: 100%; font-size: 13.5px; padding: 9px 11px;
    background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--text); border-radius: var(--radius-sm);
  }
  #pw::placeholder { color: var(--text-faint); }
  .btn-primary {
    width: 100%; margin-top: 14px; font-size: 13.5px; font-weight: 600;
    background: var(--accent); color: var(--accent-fg); border: none;
    padding: 9px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: filter .12s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:active { filter: brightness(.94); }
  #login .err { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 1em; }

  #main { display: none; max-width: 1180px; margin: 0 auto; padding: 20px 24px 60px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
  .search-wrap {
    flex: 1 1 260px; min-width: 200px; display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
    padding: 8px 11px;
  }
  .search-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  .search-wrap svg { flex: none; color: var(--text-faint); }
  #q { flex: 1; border: none; background: transparent; font-size: 13.5px; color: var(--text); }
  #q::placeholder { color: var(--text-faint); }
  kbd {
    font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--border-strong);
    border-radius: 4px; padding: 1px 5px; color: var(--text-faint); background: var(--surface-2);
  }

  .segmented { display: flex; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 2px; flex: none; }
  .segmented button {
    font-size: 12px; font-weight: 500; padding: 6px 13px; background: transparent; color: var(--text-muted);
    border: none; border-radius: 4px; cursor: pointer; transition: background .12s ease, color .12s ease;
  }
  .segmented button[aria-pressed="true"] { background: var(--accent); color: var(--accent-fg); }

  .chipbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 11px;
    border-radius: 999px; border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-muted); cursor: pointer; transition: all .12s ease;
  }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .chip[aria-pressed="true"] { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
  .chip:hover:not([aria-pressed="true"]) { border-color: var(--text-faint); color: var(--text); }

  .meta-row { display: flex; align-items: center; gap: 10px; color: var(--text-faint); font-size: 12px; margin-bottom: 10px; }

  #banner {
    display: none; align-items: center; gap: 8px; font-size: 12.5px; padding: 9px 12px;
    background: var(--warning-bg); color: var(--warning); border: 1px solid transparent;
    border-radius: var(--radius-sm); margin-bottom: 12px;
  }

  .table-wrap { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
  thead th {
    background: var(--surface-2); text-align: left; font-weight: 500;
    font-size: 11px; letter-spacing: .04em; color: var(--text-faint); text-transform: uppercase;
    padding: 9px 14px; border-bottom: 1px solid var(--border); user-select: none;
  }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--text); }
  thead th .arrow { margin-left: 4px; font-size: 9px; opacity: .8; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s ease; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface-hover); }
  tbody td { padding: 11px 14px; vertical-align: top; }
  td.statement-cell { max-width: 0; width: 46%; }
  .statement-text {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    font-size: 13.5px; line-height: 1.5;
  }
  .ns-cell { display: flex; align-items: center; gap: 7px; white-space: nowrap; font-size: 12.5px; color: var(--text-muted); }
  .ns-cell .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .kind-cell { color: var(--text-muted); font-size: 12.5px; white-space: nowrap; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600;
    padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .status-pill.active { background: var(--success-bg); color: var(--success); }
  .status-pill.invalidated { background: var(--danger-bg); color: var(--danger); }
  .status-pill .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .created-cell { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-faint); white-space: nowrap; text-align: right; }
  .snippet-row td { padding-top: 0; }
  .snippet { font-size: 12px; color: var(--text-faint); font-style: italic; margin-top: 3px; }

  .empty-row td { text-align: center; padding: 56px 20px; color: var(--text-faint); font-size: 13.5px; }

  #scrim { display: none; position: fixed; inset: 0; background: var(--scrim); z-index: 40; opacity: 0; transition: opacity .18s ease; }
  #detail {
    display: none; position: fixed; right: 0; top: 0; width: min(480px, 100vw); height: 100%;
    overflow-y: auto; background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: -24px 0 48px -24px rgba(0,0,0,.5); z-index: 50;
    transform: translateX(24px); opacity: 0; transition: transform .2s cubic-bezier(.2,.7,.3,1), opacity .18s ease;
    padding: 22px 26px 60px;
  }
  #detail.open { transform: translateX(0); opacity: 1; }
  #detail .closeBtn {
    position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
    background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); cursor: pointer;
    color: var(--text-muted); font-size: 15px; line-height: 1;
  }
  #detail .closeBtn:hover { color: var(--text); border-color: var(--text-faint); }
  #detail .kicker-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text-faint); margin-bottom: 8px; padding-right: 34px; }
  #detail h2 { font-size: 19px; font-weight: 600; margin: 0 0 14px; padding-right: 34px; line-height: 1.4; }

  .alert {
    display: flex; align-items: flex-start; gap: 8px; font-size: 12.5px; padding: 10px 12px;
    border-radius: var(--radius-sm); margin-bottom: 16px; background: var(--danger-bg); color: var(--danger);
  }
  .alert button { background: none; border: none; color: inherit; text-decoration: underline; cursor: pointer; padding: 0; font: inherit; }

  .field { margin-bottom: 14px; }
  .field .label { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 4px; }
  .field .val { font-size: 13.5px; line-height: 1.6; }
  .tagrow { display: flex; flex-wrap: wrap; gap: 6px; }
  .tagrow span { font-family: var(--font-mono); font-size: 11px; padding: 2px 8px; border: 1px solid var(--border-strong); border-radius: 999px; color: var(--text-muted); }

  .body-content { font-size: 13.5px; line-height: 1.75; border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
  .body-content pre { background: var(--surface-2); padding: 10px 12px; overflow-x: auto; font-family: var(--font-mono); font-size: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .body-content code { font-family: var(--font-mono); font-size: 12.5px; }
  .body-content a { color: var(--accent); }

  h3.section { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-faint); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 22px 0 12px; }
  .chain { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chain button {
    font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--accent); cursor: pointer;
  }
  .chain button:hover { border-color: var(--accent); }

  .timeline { list-style: none; padding: 0; margin: 0; position: relative; }
  .timeline::before { content: ""; position: absolute; left: 3px; top: 4px; bottom: 4px; width: 1px; background: var(--border-strong); }
  .timeline li { position: relative; padding: 0 0 14px 18px; }
  .timeline li::before { content: ""; position: absolute; left: 0; top: 5px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .timeline .d { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); }
  .timeline .s { font-size: 12.5px; margin-top: 2px; }
  .timeline .sha { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }

  @media (max-width: 720px) {
    #detail { width: 100vw; }
    .ns-cell, .kind-cell, .created-cell { display: none; }
    td.statement-cell { width: auto; }
  }
</style>
</head>
<body>
<header>
  <div class="logo-mark" aria-hidden="true">P</div>
  <div class="brand">
    <span class="name">plk-memory</span>
    <span class="kicker">knowledge ledger</span>
  </div>
  <div class="ro-badge"><span class="dot"></span>read-only</div>
</header>

<div id="login">
  <h2>ログイン</h2>
  <p class="hint">記憶台帳を閲覧するにはパスワードを入力してください。</p>
  <label class="field-label" for="pw">Password</label>
  <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
  <button id="loginBtn" class="btn-primary">ログイン</button>
  <div class="err" id="loginErr" role="alert"></div>
</div>

<div id="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5.2" stroke="currentColor" stroke-width="1.5"/>
        <line x1="11" y1="11" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="q" placeholder="statement を検索…" aria-label="検索">
      <kbd>Enter</kbd>
    </div>
    <div class="segmented" id="statusToggle" role="group" aria-label="状態">
      <button data-v="active" aria-pressed="true">有効</button>
      <button data-v="invalidated" aria-pressed="false">無効化</button>
    </div>
    <div class="segmented" id="kindToggle" role="group" aria-label="kind">
      <button data-v="" aria-pressed="true">すべて</button>
      <button data-v="philosophy" aria-pressed="false">philosophy</button>
      <button data-v="logic" aria-pressed="false">logic</button>
      <button data-v="knowhow" aria-pressed="false">knowhow</button>
    </div>
  </div>
  <div class="chipbar" id="nsBar" role="group" aria-label="namespace"></div>
  <div class="meta-row" id="metaRow"></div>
  <div id="banner" role="status"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>記憶</th>
          <th>namespace</th>
          <th>kind</th>
          <th>状態</th>
          <th class="sortable" id="sortByCreated">作成日<span class="arrow">▾</span></th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<div id="scrim"></div>
<div id="detail" role="dialog" aria-label="fact 詳細"></div>

<script src="/static/app.js"></script>
</body>
</html>
